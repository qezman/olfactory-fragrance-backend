apiVersion: v1
kind: Service
metadata:
  name: olfactory-fragrance-backend
  namespace: { { .Release.Namespace } }
spec:
  type: { { .Values.service.type } }
  selector:
    app: { { .Release.Name } }
  ports:
    - protocol: TCP
      port: { { .Values.service.port } }
      targetPort: { { .Values.service.targetPort } }

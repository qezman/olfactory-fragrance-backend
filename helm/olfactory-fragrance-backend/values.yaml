replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 4000

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

env:
  NODE_ENV: "production"
  PORT: "4000"
  CORS_ORIGIN: ""

secrets:
  DATABASE_URL: ""
